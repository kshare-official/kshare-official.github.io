# ==================================================
# KShare Site Configuration (SEO Optimized)
# ==================================================

# Site Settings
title: "KShare - AI Prompts Library for Image Generators & AI Tools"
description: "Discover the best AI prompts for image generators and creative AI tools. Explore prompts for portraits, cinematic photos, posters, art and more."
author: "KShare Team"
email: "support@kshare.in"
url: "https://kshare-official.github.io"
baseurl: ""   # Leave empty for root domain (e.g., kshare-official.github.io)

# SEO & Social
keywords: "AI prompts, image prompts, creative writing, AI art, prompt engineering, Midjourney prompts, ChatGPT prompts, AI tools"
twitter_username: "@kshare"
github_username: "kshare"
social:
  name: "KShare"
  links:
    - "https://x.com/kshare"
    - "https://github.com/kshare"
    - "https://linkedin.com/company/kshare"

# ===============================================
# Build Settings
# ===============================================
markdown: kramdown
highlighter: rouge

# Permalink structure (SEO friendly)
# Uses only the post title in the URL (no categories)
permalink: /:title/

paginate: 10
paginate_path: "/blog/page:num/"

# ===============================================
# Collections
# ===============================================
collections:
  posts:
    output: true
    permalink: /:title/

# ===============================================
# Plugins
# ===============================================
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  # - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives
  - jekyll-reading-time
  - jekyll-minifier

# ===============================================
# Jekyll Archives Configuration
# ===============================================
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: archive
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# ===============================================
# Include & Exclude Settings
# ===============================================
include:
  - _pages

exclude:
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# ===============================================
# Timezone
# ===============================================
timezone: Asia/Kolkata

# ===============================================
# Google Analytics (Optional)
# ===============================================
google_analytics: ""

# ===============================================
# Performance & Caching (GitHub Pages)
# ===============================================
# Note: GitHub Pages automatically handles caching
# These settings optimize for GitHub Pages CDN
# sass:
#   style: compressed

# Minify HTML output
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: all
  blanklines: false
  profile: false
  ignore:
    envs: []
